<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linear Relationships Learning Game</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        #game-container { max-width: 800px; margin: auto; }
        .section { margin-bottom: 50px; }
        h2 { color: #2d7dc9; }
        .slider-label { margin-right: 8px; }
        input[type='range']{ width:180px; }
    </style>
</head>
<body>
<div id="game-container">

    <h1>Linear Relationships Learning Game</h1>

    <div class="section" id="explore-section">
        <h2>1. Explore Linear Equations</h2>
        <label class="slider-label">Slope (m):</label>
        <input type="range" min="-5" max="5" step="0.5" value="1" id="explore-slope">
        <span id="explore-slope-value">1</span>
        <br/>
        <label class="slider-label">Intercept (c):</label>
        <input type="range" min="-10" max="10" step="1" value="0" id="explore-intercept">
        <span id="explore-intercept-value">0</span>
        <div id="explore-plot" style="width: 100%; height: 400px;"></div>
        <p>Change the sliders above and watch how the graph changes!</p>
    </div>

    <div class="section" id="guess-section">
        <h2>2. Guess the Equation Game</h2>
        <button id="guess-new">New Mystery Line</button>
        <div id="guess-plot" style="width: 100%; height: 400px;"></div>
        <form id="guess-form">
            <label>Slope (m): <input type="number" id="guess-slope" required></label>
            <label>Intercept (c): <input type="number" id="guess-intercept" required></label>
            <button type="submit">Submit Guess</button>
        </form>
        <div id="guess-feedback"></div>
    </div>

    <div class="section" id="intersection-section">
        <h2>3. Intersection Challenge</h2>
        <button id="intersection-new">New Lines</button>
        <div id="intersection-plot" style="width: 100%; height: 400px;"></div>
        <form id="intersection-form">
            <label>x-value of intersection: <input type="number" step="0.01" id="intersection-x" required></label>
            <button type="submit">Submit Guess</button>
        </form>
        <div id="intersection-feedback"></div>
    </div>

</div>
<script>
function plotLinear(target, slope, intercept, lineColor='blue') {
    let x = [];
    let y = [];
    for(let i=-10; i<=10; i+=0.1){
        x.push(i);
        y.push(slope*i+intercept);
    }
    let trace = {
        x: x,
        y: y,
        mode: 'lines',
        line: {color: lineColor},
        name: `y = ${slope}x + ${intercept}`,
    };
    let scatter = {
        x: [0],
        y: [intercept],
        mode: 'markers',
        marker: {color:'red', size:10},
        name: 'Intercept'
    };
    Plotly.newPlot(target, [trace, scatter], {
        margin: {t: 40},
        xaxis: {title:"x", range:[-10,10]},
        yaxis: {title:"y", range:[-20,20]},
        showlegend:true,
        title: 'Linear Relationship'
    });
}

// Explore Section
function updateExplorePlot() {
    let m = parseFloat(document.getElementById('explore-slope').value);
    let c = parseFloat(document.getElementById('explore-intercept').value);
    document.getElementById('explore-slope-value').textContent = m;
    document.getElementById('explore-intercept-value').textContent = c;
    plotLinear('explore-plot', m, c);
}
document.getElementById('explore-slope').addEventListener('input', updateExplorePlot);
document.getElementById('explore-intercept').addEventListener('input', updateExplorePlot);
updateExplorePlot();

// Guess the Equation Game
let mysterySlope = 1, mysteryIntercept = 0;
function newMysteryLine() {
    mysterySlope = Math.floor(Math.random()*11)-5; // -5 to 5
    mysteryIntercept = Math.floor(Math.random()*21)-10; // -10 to 10
    plotLinear('guess-plot', mysterySlope, mysteryIntercept, 'purple');
    document.getElementById('guess-feedback').textContent = '';
    document.getElementById('guess-form').reset();
}
document.getElementById('guess-new').addEventListener('click', newMysteryLine);
newMysteryLine();

document.getElementById('guess-form').addEventListener('submit', function(e){
    e.preventDefault();
    let slopeGuess = parseInt(document.getElementById('guess-slope').value);
    let interceptGuess = parseInt(document.getElementById('guess-intercept').value);
    let feedback = document.getElementById('guess-feedback');
    if(slopeGuess === mysterySlope && interceptGuess === mysteryIntercept){
        feedback.innerHTML = `<span style='color:green'>🎉 Correct! The equation is y = ${mysterySlope}x + ${mysteryIntercept}.</span>`;
    } else {
        feedback.innerHTML = `<span style='color:red'>❌ Not quite! The actual equation was y = ${mysterySlope}x + ${mysteryIntercept}. Try again!</span>`;
    }
});

// Intersection Challenge Game
let slope1, slope2, intercept1, intercept2, intersectionX, intersectionY;
function newIntersectionLines() {
    slope1 = Math.floor(Math.random()*7)-3; // -3 to 3
    intercept1 = Math.floor(Math.random()*13)-6; // -6 to 6
    do {
        slope2 = Math.floor(Math.random()*7)-3; // avoid parallel lines
    } while(slope1 === slope2);
    intercept2 = Math.floor(Math.random()*13)-6;
    intersectionX = (intercept2-intercept1)/(slope1-slope2);
    intersectionY = slope1*intersectionX+intercept1;

    let x = [], y1 = [], y2 = [];
    for(let i=-10; i<=10; i+=0.1){
        x.push(i);
        y1.push(slope1*i+intercept1);
        y2.push(slope2*i+intercept2);
    }
    let trace1 = {x:x, y:y1, mode:'lines', line:{color:'blue'}, name:`y = ${slope1}x + ${intercept1}`};
    let trace2 = {x:x, y:y2, mode:'lines', line:{color:'red'}, name:`y = ${slope2}x + ${intercept2}`};
    let intersection = {x:[intersectionX], y:[intersectionY], mode:'markers', marker:{color:'orange', size:12}, name:'Intersection'};
    Plotly.newPlot('intersection-plot', [trace1, trace2, intersection], {
        margin:{t:40},
        xaxis:{title:"x", range:[-10,10]},
        yaxis:{title:"y", range:[-20,20]},
        showlegend:true,
        title:'Two Lines - Where Do They Intersect?'
    });
    document.getElementById('intersection-feedback').textContent = '';
    document.getElementById('intersection-form').reset();
}
document.getElementById('intersection-new').addEventListener('click', newIntersectionLines);
newIntersectionLines();

document.getElementById('intersection-form').addEventListener('submit', function(e){
    e.preventDefault();
    let xGuess = parseFloat(document.getElementById('intersection-x').value);
    let feedback = document.getElementById('intersection-feedback');
    if(Math.abs(xGuess-intersectionX) <= 0.5){
        feedback.innerHTML = `<span style='color:green'>🎉 Correct! Intersection is at x = ${intersectionX.toFixed(2)}, y = ${intersectionY.toFixed(2)}</span>`;
    } else {
        feedback.innerHTML = `<span style='color:red'>❌ Not quite. The intersection is at x = ${intersectionX.toFixed(2)}, y = ${intersectionY.toFixed(2)}. Try again!</span>`;
    }
});
</script>
</body>
</html>

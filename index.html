<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Linear Relationships - Fun & Visual Activity</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body {font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f8ff; margin: 20px auto; max-width: 900px; color: #20232a;}
        h1, h2 {text-align: center; color: #1f618d;}
        .section {background: white; padding: 20px 25px; margin-bottom: 45px; border-radius: 8px; box-shadow: 0 0 10px rgba(31,97,141,0.3);}
        label {font-weight: 600; margin-right: 8px;}
        input[type=range] {width: 180px; vertical-align: middle; margin-right: 10px;}
        input[type=number], input[type=text] {width: 80px; padding: 4px 6px; margin: 0 10px 0 5px; border-radius: 3px; border: 1px solid #ccc;}
        button {background-color: #1f618d; color: white; border: none; padding: 10px 18px; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-left: 10px;}
        button:hover {background-color: #145a86;}
        form {margin-top: 15px; display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 15px;}
        #feedback, #guess-feedback, #intersection-feedback {margin-top: 10px; font-weight: 700; text-align: center;}
        .correct {color: green;}
        .incorrect {color: red;}
        #plots {display: flex; flex-direction: column; gap: 40px;}
        #explore-plot, #guess-plot, #intersection-plot {width: 100%; height: 400px;}
        @media screen and (max-width: 600px) {
            input[type=range] {width: 100%; margin-bottom: 8px;}
            form {flex-direction: column;}
            button {margin-left: 0;}
        }
    </style>
</head>
<body>

    <h1>Linear Relationships: Fun & Visual Learning Activity</h1>

    <div id="plots">

        <!-- Section 1: Exploration -->
        <section class="section" id="explore-section">
            <h2>1. Explore Linear Equations</h2>
            <div style="text-align:center; margin-bottom: 10px;">
                <label for="explore-slope">Slope (m):</label>
                <input type="range" id="explore-slope" min="-5" max="5" step="0.1" value="1" />
                <span id="explore-slope-value">1</span>
                 
                <input type="text" id="explore-slope-input" placeholder="Or type e.g. 2/3, 1.5" />
                <button id="explore-reset" type="button">Reset</button>
                <br/>
                <label for="explore-intercept">Intercept (c):</label>
                <input type="range" id="explore-intercept" min="-10" max="10" step="0.5" value="0" />
                <span id="explore-intercept-value">0</span>
            </div>
            <div id="explore-plot"></div>
            <p style="text-align:center; font-style: italic; margin-top:10px;">
                Use the slider or type your own slope as a whole number, fraction or decimal.<br>
                Examples: <b>2</b>, <b>-3</b>, <b>3/4</b>, <b>-2/5</b>, <b>1.25</b>
            </p>
        </section>

        <!-- Section 2: Guess the Equation Game -->
        <section class="section" id="guess-section">
            <h2>2. Guess the Equation Game</h2>
            <button id="guess-new" type="button">New Mystery Line</button>
            <button id="guess-reset" type="button">Reset</button>
            <div id="guess-plot"></div>
            <form id="guess-form" autocomplete="off">
                <label for="guess-slope">Slope (m):</label>
                <input type="number" step="any" id="guess-slope" required />
                <label for="guess-intercept">Intercept (c):</label>
                <input type="number" step="any" id="guess-intercept" required />
                <button type="submit">Submit Guess</button>
            </form>
            <div id="guess-feedback"></div>
        </section>

        <!-- Section 3: Intersection Challenge -->
        <section class="section" id="intersection-section">
            <h2>3. Intersection Challenge</h2>
            <button id="intersection-new" type="button">New Lines</button>
            <button id="intersection-reset" type="button">Reset</button>
            <div id="intersection-plot"></div>
            <form id="intersection-form" autocomplete="off">
                <label for="intersection-x">Guess x-value of intersection:</label>
                <input type="number" step="any" id="intersection-x" required />
                <button type="submit">Submit Guess</button>
            </form>
            <div id="intersection-feedback"></div>
        </section>

    </div>

<script>
// --- Fraction Parsing Utility ---
function parseFraction(str) {
    str = str.trim();
    if (str.includes('/')) {
        let parts = str.split('/');
        if (parts.length === 2) {
            let num = parseFloat(parts[0]);
            let den = parseFloat(parts[1]);
            if (!isNaN(num) && !isNaN(den) && den !== 0) {
                return num / den;
            }
        }
        return NaN; // Invalid fraction
    } else {
        let val = parseFloat(str);
        return isNaN(val) ? NaN : val;
    }
}

// Utility: Generate line points
function generateLinePoints(slope, intercept, xmin=-10, xmax=10, step=0.1){
    let xs = [];
    let ys = [];
    for(let x=xmin; x<=xmax; x+=step){
        xs.push(x);
        ys.push(slope*x + intercept);
    }
    return {x: xs, y: ys};
}

// Plot function using Plotly
function plotLine(divId, slope, intercept, color="#1f618d", title="Linear Relationship"){
    const points = generateLinePoints(slope, intercept);
    const traceLine = {
        x: points.x,
        y: points.y,
        type: 'scatter',
        mode: 'lines',
        name: `y = ${slope.toFixed(2)}x + ${intercept.toFixed(2)}`,
        line: { color: color, width: 3 }
    };
    const traceIntercept = {
        x: [0],
        y: [intercept],
        type: 'scatter',
        mode: 'markers',
        name: 'Y-Intercept',
        marker: { color: 'red', size: 10 }
    };
    Plotly.newPlot(divId, [traceLine, traceIntercept], {
        title: {text: title, font: {size: 18}},
        xaxis: {title: 'x', range: [-10, 10]},
        yaxis: {title: 'y', range: [-20, 20]},
        margin: {t: 50}
    }, {responsive: true});
}

// --------------- Exploration Section ---------------
const exploreSlope = document.getElementById('explore-slope');
const exploreIntercept = document.getElementById('explore-intercept');
const exploreSlopeVal = document.getElementById('explore-slope-value');
const exploreInterceptVal = document.getElementById('explore-intercept-value');
const exploreSlopeInput = document.getElementById('explore-slope-input');
const exploreResetBtn = document.getElementById('explore-reset');

let exploreSlopeValue = parseFloat(exploreSlope.value);

function updateExplorePlotCustom(slopeVal){
    const c = parseFloat(exploreIntercept.value);
    exploreSlopeVal.textContent = slopeVal;
    exploreInterceptVal.textContent = c;
    plotLine('explore-plot', slopeVal, c, "#1f618d", "Explore Linear Equation");
}

exploreSlope.addEventListener('input', function(){
    exploreSlopeValue = parseFloat(exploreSlope.value);
    exploreSlopeVal.textContent = exploreSlopeValue;
    exploreSlopeInput.value = ""; // Clear custom input
    updateExplorePlotCustom(exploreSlopeValue);
});
exploreIntercept.addEventListener('input', function(){
    updateExplorePlotCustom(exploreSlopeValue);
});
exploreSlopeInput.addEventListener('change', function(){
    let val = parseFraction(exploreSlopeInput.value);
    if (!isNaN(val)) {
        exploreSlopeValue = val;
        exploreSlopeVal.textContent = exploreSlopeInput.value;
        plotLine('explore-plot', val, parseFloat(exploreIntercept.value), "#1f618d", "Explore Linear Equation");
    } else {
        exploreSlopeInput.value = "";
        alert("Enter a valid whole number, fraction (e.g. 3/4), or decimal.");
    }
});

exploreResetBtn.addEventListener('click', function(){
    exploreSlope.value = 1;
    exploreIntercept.value = 0;
    exploreSlopeInput.value = "";
    exploreSlopeValue = 1;
    updateExplorePlotCustom(1);
});
updateExplorePlotCustom(1);

// --------------- Guess the Equation Section ---------------
let mysterySlope = 0;
let mysteryIntercept = 0;

function newMysteryLine(){
    // Random whole, decimal, or fraction slope value
    let rand = Math.random();
    if(rand < 0.33){
        // Whole number
        mysterySlope = Math.floor(Math.random()*11) - 5;
    } else if(rand < 0.66){
        // Simple fraction (denominator from 2 to 5)
        let num = Math.floor(Math.random()*11) - 5;
        let den = Math.floor(Math.random()*4)+2;
        mysterySlope = num/den;
    } else {
        // Decimal
        mysterySlope = Number((Math.random()*10 -5).toFixed(2));
    }
    mysteryIntercept = Number((Math.random()*20 -10).toFixed(2));
    plotLine('guess-plot', parseFloat(mysterySlope), parseFloat(mysteryIntercept), "purple", "Guess the Equation!");
    document.getElementById('guess-feedback').textContent = "";
    document.getElementById('guess-form').reset();
}
document.getElementById('guess-new').addEventListener('click', newMysteryLine);
const guessResetBtn = document.getElementById('guess-reset');
guessResetBtn.addEventListener('click', function(){
    document.getElementById('guess-form').reset();
    document.getElementById('guess-feedback').textContent = "";
});
document.getElementById('guess-form').addEventListener('submit', function(e){
    e.preventDefault();
    const guessM = parseFloat(document.getElementById('guess-slope').value);
    const guessC = parseFloat(document.getElementById('guess-intercept').value);
    const feedback = document.getElementById('guess-feedback');
    const tol = 0.3; // tolerance for guessing
    if(Math.abs(guessM - mysterySlope) <= tol && Math.abs(guessC - mysteryIntercept) <= tol){
        feedback.textContent = `🎉 Correct! The equation is y = ${mysterySlope}x + ${mysteryIntercept}.`;
        feedback.className = "correct";
    } else {
        feedback.textContent = `❌ Not quite! The equation was y = ${mysterySlope}x + ${mysteryIntercept}. Try again!`;
        feedback.className = "incorrect";
    }
});
newMysteryLine();

// --------------- Intersection Challenge Section ---------------
let slope1, slope2, intercept1, intercept2, intersectionX, intersectionY;

function newIntersectionLines(){
    // Random slope: whole number or fraction or decimal
    function randomSlope(){
        let rand = Math.random();
        if(rand < 0.33){
            return Math.floor(Math.random()*7)-3;
        } else if(rand < 0.66){
            let num = Math.floor(Math.random()*7)-3;
            let den = Math.floor(Math.random()*4)+2;
            return num/den;
        } else {
            return Number((Math.random()*6 - 3).toFixed(2));
        }
    }
    slope1 = randomSlope();
    intercept1 = Number((Math.random()*12 - 6).toFixed(2));
    do { slope2 = randomSlope(); } while(slope2 === slope1);
    intercept2 = Number((Math.random()*12 - 6).toFixed(2));
    intersectionX = (intercept2 - intercept1) / (slope1 - slope2);
    intersectionY = slope1*intersectionX + parseFloat(intercept1);
    let x = [], y1 = [], y2 = [];
    for(let i=-10; i<=10; i+=0.1){
        x.push(i);
        y1.push(slope1*i + intercept1);
        y2.push(slope2*i + intercept2);
    }
    const trace1 = {x: x, y: y1, mode: 'lines', name: `Line 1: y = ${slope1.toFixed(2)}x + ${intercept1.toFixed(2)}`, line: {color: 'blue', width: 3}};
    const trace2 = {x: x, y: y2, mode: 'lines', name: `Line 2: y = ${slope2.toFixed(2)}x + ${intercept2.toFixed(2)}`, line: {color: 'red', width: 3}};
    const traceIntersection = {x: [intersectionX], y: [intersectionY], mode: 'markers', name: 'Intersection', marker: {color: 'orange', size: 12}};
    Plotly.newPlot('intersection-plot', [trace1, trace2, traceIntersection], {
        title: 'Intersection Challenge: Find the Intersection Point',
        xaxis: {title: 'x', range: [-10,10]},
        yaxis: {title: 'y', range: [-20,20]},
        margin: {t: 50}
    }, {responsive: true});
    document.getElementById('intersection-feedback').textContent = "";
    document.getElementById('intersection-form').reset();
}
document.getElementById('intersection-new').addEventListener('click', newIntersectionLines);
const intersectionResetBtn = document.getElementById('intersection-reset');
intersectionResetBtn.addEventListener('click', function(){
    document.getElementById('intersection-form').reset();
    document.getElementById('intersection-feedback').textContent = "";
});
document.getElementById('intersection-form').addEventListener('submit', function(e){
    e.preventDefault();
    const guessX = parseFloat(document.getElementById('intersection-x').value);
    const feedback = document.getElementById('intersection-feedback');
    const tolerance = 0.5;
    if(Math.abs(guessX - intersectionX) <= tolerance){
        feedback.textContent = `🎉 Correct! Intersection is at x = ${intersectionX.toFixed(2)}, y = ${intersectionY.toFixed(2)}.`;
        feedback.className = "correct";
    } else {
        feedback.textContent = `❌ Not quite. The intersection is at x = ${intersectionX.toFixed(2)}, y = ${intersectionY.toFixed(2)}. Try again!`;
        feedback.className = "incorrect";
    }
});
newIntersectionLines();
</script>

</body>
</html>
